<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2560" font-family="Georgia, serif">
  <defs>
    <radialGradient id="paper" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#f3e6c7"/>
      <stop offset="55%" stop-color="#ecd9ae"/>
      <stop offset="82%" stop-color="#dcc290"/>
      <stop offset="100%" stop-color="#c3a06a"/>
    </radialGradient>
    <radialGradient id="foxing1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a9713c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a9713c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sea" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cdbb8e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#b99a5c" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="islandFill" cx="45%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#e9d6a8"/>
      <stop offset="100%" stop-color="#c9a865"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Base paper -->
  <rect x="0" y="0" width="1600" height="2560" fill="url(#paper)"/>
  <rect x="0" y="0" width="1600" height="2560" fill="url(#sea)"/>

  <!-- foxed / aged blotches -->
  <ellipse cx="180" cy="260" rx="220" ry="160" fill="url(#foxing1)"/>
  <ellipse cx="1420" cy="2300" rx="260" ry="200" fill="url(#foxing1)"/>
  <ellipse cx="1350" cy="420" rx="150" ry="110" fill="url(#foxing1)"/>
  <ellipse cx="220" cy="2250" rx="200" ry="150" fill="url(#foxing1)"/>
  <ellipse cx="800" cy="1500" rx="500" ry="380" fill="url(#foxing1)" opacity="0.5"/>

  <!-- deckle / worn border -->
  <rect x="46" y="46" width="1508" height="2468" fill="none" stroke="#5a4324" stroke-width="3" opacity="0.55"/>
  <rect x="66" y="66" width="1468" height="2428" fill="none" stroke="#5a4324" stroke-width="1.2" opacity="0.5"/>

  <!-- Graticule ticks along border -->
  <g stroke="#5a4324" stroke-width="1.2" opacity="0.55">
    <!-- top/bottom ticks -->
    <g id="ticksTop">
      <line x1="140" y1="66" x2="140" y2="86"/><line x1="220" y1="66" x2="220" y2="86"/><line x1="300" y1="66" x2="300" y2="86"/>
      <line x1="380" y1="66" x2="380" y2="86"/><line x1="460" y1="66" x2="460" y2="86"/><line x1="540" y1="66" x2="540" y2="86"/>
      <line x1="1060" y1="66" x2="1060" y2="86"/><line x1="1140" y1="66" x2="1140" y2="86"/><line x1="1220" y1="66" x2="1220" y2="86"/>
      <line x1="1300" y1="66" x2="1300" y2="86"/><line x1="1380" y1="66" x2="1380" y2="86"/><line x1="1460" y1="66" x2="1460" y2="86"/>
    </g>
    <g id="ticksBottom">
      <line x1="140" y1="2474" x2="140" y2="2494"/><line x1="220" y1="2474" x2="220" y2="2494"/><line x1="300" y1="2474" x2="300" y2="2494"/>
      <line x1="380" y1="2474" x2="380" y2="2494"/><line x1="460" y1="2474" x2="460" y2="2494"/><line x1="540" y1="2474" x2="540" y2="2494"/>
      <line x1="1060" y1="2474" x2="1060" y2="2494"/><line x1="1140" y1="2474" x2="1140" y2="2494"/><line x1="1220" y1="2474" x2="1220" y2="2494"/>
      <line x1="1300" y1="2474" x2="1300" y2="2494"/><line x1="1380" y1="2474" x2="1380" y2="2494"/><line x1="1460" y1="2474" x2="1460" y2="2494"/>
    </g>
    <g id="ticksLeft">
      <line x1="66" y1="200" x2="86" y2="200"/><line x1="66" y1="280" x2="86" y2="280"/><line x1="66" y1="360" x2="86" y2="360"/>
      <line x1="66" y1="1850" x2="86" y2="1850"/><line x1="66" y1="1930" x2="86" y2="1930"/><line x1="66" y1="2010" x2="86" y2="2010"/>
      <line x1="66" y1="2090" x2="86" y2="2090"/><line x1="66" y1="2170" x2="86" y2="2170"/><line x1="66" y1="2250" x2="86" y2="2250"/>
      <line x1="66" y1="2330" x2="86" y2="2330"/>
    </g>
    <g id="ticksRight">
      <line x1="1514" y1="200" x2="1534" y2="200"/><line x1="1514" y1="280" x2="1534" y2="280"/><line x1="1514" y1="360" x2="1534" y2="360"/>
      <line x1="1514" y1="1850" x2="1534" y2="1850"/><line x1="1514" y1="1930" x2="1534" y2="1930"/><line x1="1514" y1="2010" x2="1534" y2="2010"/>
      <line x1="1514" y1="2090" x2="1534" y2="2090"/><line x1="1514" y1="2170" x2="1534" y2="2170"/><line x1="1514" y1="2250" x2="1534" y2="2250"/>
      <line x1="1514" y1="2330" x2="1534" y2="2330"/>
    </g>
  </g>

  <!-- Rhumb line network radiating from two compass roses -->
  <g stroke="#7a5a2e" stroke-width="1" opacity="0.38">
    <g id="rhumbA">
      <line x1="360" y1="330" x2="360" y2="2260"/>
      <line x1="70" y1="330" x2="1530" y2="330"/>
      <line x1="70" y1="70" x2="1530" y2="2260"/>
      <line x1="1530" y1="70" x2="70" y2="2260"/>
      <line x1="70" y1="900" x2="1530" y2="-90"/>
      <line x1="70" y1="-90" x2="1530" y2="900"/>
      <line x1="70" y1="1760" x2="1530" y2="770"/>
      <line x1="70" y1="770" x2="1530" y2="1760"/>
    </g>
  </g>
  <g stroke="#7a5a2e" stroke-width="1" opacity="0.3">
    <g id="rhumbB" transform="translate(0,0)">
      <line x1="1180" y1="1980" x2="1180" y2="60"/>
      <line x1="1180" y1="1980" x2="70" y2="1980"/>
      <line x1="1180" y1="1980" x2="70" y2="870"/>
      <line x1="1180" y1="1980" x2="1530" y2="870"/>
      <line x1="1180" y1="1980" x2="70" y2="2400"/>
      <line x1="1180" y1="1980" x2="1530" y2="2400"/>
      <line x1="1180" y1="1980" x2="700" y2="60"/>
      <line x1="1180" y1="1980" x2="1530" y2="1300"/>
    </g>
  </g>

  <!-- Compass rose (secondary, smaller, upper right) -->
  <g transform="translate(1180,480)" opacity="0.75">
    <circle r="120" fill="none" stroke="#5a4324" stroke-width="1"/>
    <circle r="80" fill="none" stroke="#5a4324" stroke-width="0.8"/>
    <g stroke="#5a4324" stroke-width="0.7">
      <line x1="-140" y1="0" x2="140" y2="0"/>
      <line x1="0" y1="-140" x2="0" y2="140"/>
      <line x1="-99" y1="-99" x2="99" y2="99"/>
      <line x1="-99" y1="99" x2="99" y2="-99"/>
    </g>
    <path d="M0,-140 L14,-14 L0,0 L-14,-14 Z" fill="#5a4324"/>
    <path d="M0,140 L14,14 L0,0 L-14,14 Z" fill="#8a6a3a"/>
    <path d="M140,0 L14,14 L0,0 L14,-14 Z" fill="#8a6a3a"/>
    <path d="M-140,0 L-14,14 L0,0 L-14,-14 Z" fill="#8a6a3a"/>
  </g>

  <!-- Title block panel -->
  <rect x="200" y="230" width="1200" height="330" fill="#f3e6c7" opacity="0.55" stroke="#5a4324" stroke-width="1.5"/>
  <rect x="216" y="246" width="1168" height="298" fill="none" stroke="#5a4324" stroke-width="0.8"/>

  <text x="800" y="330" text-anchor="middle" font-size="30" letter-spacing="8" fill="#5a4324" font-style="italic">A Novel in Maps, being the Papers of</text>
  <text x="800" y="410" text-anchor="middle" font-size="96" letter-spacing="10" fill="#3d2c14" font-weight="bold">AN ATLAS</text>
  <text x="800" y="500" text-anchor="middle" font-size="96" letter-spacing="10" fill="#3d2c14" font-weight="bold">OF ERRORS</text>

  <line x1="440" y1="540" x2="1160" y2="540" stroke="#5a4324" stroke-width="1.5"/>
  <text x="800" y="580" text-anchor="middle" font-size="26" letter-spacing="6" fill="#5a4324" font-style="italic">"corrected by the latest and best observations"</text>

  <!-- Sea area: soundings scattered -->
  <g fill="#5a4324" font-size="20" opacity="0.72" font-family="Georgia, serif">
    <text x="250" y="820">62</text>
    <text x="340" y="960">1240</text>
    <text x="180" y="1080">88</text>
    <text x="420" y="1150">1240</text>
    <text x="270" y="1300">140</text>
    <text x="150" y="1450">1240</text>
    <text x="380" y="1560">95</text>
    <text x="230" y="1700">1240</text>
    <text x="1250" y="900">73</text>
    <text x="1370" y="1050">1240</text>
    <text x="1180" y="1200">110</text>
    <text x="1420" y="1350">1240</text>
    <text x="1280" y="1520">54</text>
    <text x="1150" y="1680">1240</text>
    <text x="1350" y="1830">99</text>
    <text x="900" y="2280">1240</text>
    <text x="600" y="2350">126</text>
    <text x="1050" y="2400">1240</text>
    <text x="500" y="1950">67</text>
    <text x="700" y="2050">1240</text>
  </g>

  <!-- stippled coastline dots suggesting distant unseen shore, lower edges -->
  <g fill="#7a5a2e" opacity="0.5">
    <circle cx="120" cy="1900" r="2.5"/><circle cx="140" cy="1915" r="2"/><circle cx="160" cy="1905" r="2.2"/>
    <circle cx="185" cy="1922" r="2"/><circle cx="205" cy="1912" r="2.3"/><circle cx="130" cy="1935" r="1.8"/>
    <circle cx="1470" cy="1950" r="2.4"/><circle cx="1490" cy="1965" r="2"/><circle cx="1450" cy="1970" r="2.1"/>
    <circle cx="1510" cy="1955" r="1.9"/><circle cx="1430" cy="1990" r="2.2"/>
    <circle cx="1400" cy="700" r="2.2"/><circle cx="1420" cy="715" r="1.9"/><circle cx="1440" cy="705" r="2.1"/>
  </g>

  <!-- The phantom island: Hy-Brasil, round disc split by a channel -->
  <g transform="translate(800,1560)">
    <ellipse rx="150" ry="150" fill="#6b4a1e" opacity="0.18" filter="url(#soft)"/>
    <circle r="140" fill="url(#islandFill)" stroke="#5a4324" stroke-width="2.5"/>
    <!-- channel dividing the disc -->
    <path d="M-140,-6 Q0,26 140,-6 L140,10 Q0,42 -140,10 Z" fill="#e9dcb8" stroke="#5a4324" stroke-width="1.6"/>
    <!-- coastline stippling ring -->
    <g fill="#5a4324" opacity="0.55">
      <circle cx="0" cy="-140" r="2"/><circle cx="49" cy="-133" r="2"/><circle cx="95" cy="-103" r="2"/>
      <circle cx="126" cy="-63" r="2"/><circle cx="140" cy="0" r="2"/><circle cx="126" cy="63" r="2"/>
      <circle cx="95" cy="103" r="2"/><circle cx="49" cy="133" r="2"/><circle cx="0" cy="140" r="2"/>
      <circle cx="-49" cy="133" r="2"/><circle cx="-95" cy="103" r="2"/><circle cx="-126" cy="63" r="2"/>
      <circle cx="-140" cy="0" r="2"/><circle cx="-126" cy="-63" r="2"/><circle cx="-95" cy="-103" r="2"/>
      <circle cx="-49" cy="-133" r="2"/>
    </g>
    <text x="0" y="-170" text-anchor="middle" font-size="24" letter-spacing="3" fill="#3d2c14" font-style="italic">Hy-Brasil</text>
    <text x="0" y="200" text-anchor="middle" font-size="18" letter-spacing="4" fill="#5a4324">E.D.</text>
    <text x="0" y="228" text-anchor="middle" font-size="13" letter-spacing="1" fill="#5a4324" opacity="0.85">(existentia dubia)</text>
    <text x="0" y="8" text-anchor="middle" font-size="15" fill="#5a4324" opacity="0.8">1240</text>
  </g>

  <!-- The recurring sign: circle divided by a horizontal line, cartouche mark, small and easy to miss -->
  <g transform="translate(1255,1985)" opacity="0.85">
    <circle r="22" fill="none" stroke="#5a4324" stroke-width="2"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#5a4324" stroke-width="2"/>
  </g>
  <text x="1255" y="2030" text-anchor="middle" font-size="12" fill="#5a4324" opacity="0.7" letter-spacing="1">T.</text>

  <!-- Lower cartouche: subtitle and author -->
  <rect x="330" y="2140" width="940" height="240" fill="#f3e6c7" opacity="0.6" stroke="#5a4324" stroke-width="1.5"/>
  <rect x="346" y="2156" width="908" height="208" fill="none" stroke="#5a4324" stroke-width="0.7"/>

  <text x="800" y="2230" text-anchor="middle" font-size="40" letter-spacing="12" fill="#3d2c14">A NOVEL IN MAPS</text>
  <line x1="620" y1="2260" x2="980" y2="2260" stroke="#5a4324" stroke-width="1"/>
  <text x="800" y="2330" text-anchor="middle" font-size="46" letter-spacing="16" fill="#3d2c14" font-weight="bold">CLAUDE</text>

  <!-- small decorative corner flourishes -->
  <g stroke="#5a4324" stroke-width="1" fill="none" opacity="0.6">
    <path d="M90,90 q40,-10 60,20"/>
    <path d="M1510,90 q-40,-10 -60,20"/>
    <path d="M90,2470 q40,10 60,-20"/>
    <path d="M1510,2470 q-40,10 -60,-20"/>
  </g>
</svg>
